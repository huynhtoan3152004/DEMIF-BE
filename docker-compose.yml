# ==============================================
# Docker Compose for Demif-BE
# Use this for local development or Coolify Docker Compose deployment
# ==============================================
#
# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  📋 COOLIFY ENVIRONMENT VARIABLES - Copy vào "Environment Variables" tab     ║
# ╠══════════════════════════════════════════════════════════════════════════════╣
# ║                                                                              ║
# ║  # === DATABASE (PostgreSQL từ Coolify) ===                                  ║
# ║  ConnectionStrings__DefaultConnection=Host=<POSTGRES_HOST>;Port=5432;Database=demif_db;Username=demif;Password=<PASSWORD>;
# ║                                                                              ║
# ║  # === JWT CONFIGURATION ===                                                 ║
# ║  Jwt__Key=ThayDoiKeyNayItNhat32KyTuTroLenChoAnToan!                          ║
# ║  Jwt__Issuer=Demif.Api                                                       ║
# ║  Jwt__Audience=Demif.Client                                                  ║
# ║  Jwt__ExpirationMinutes=60                                                   ║
# ║                                                                              ║
# ║  # === ASP.NET CORE ===                                                      ║
# ║  ASPNETCORE_ENVIRONMENT=Production                                           ║
# ║                                                                              ║
# ║                                                                              ║
# ╠══════════════════════════════════════════════════════════════════════════════╣
# ║  💡 HƯỚNG DẪN:                                                               ║
# ║  1. Tạo PostgreSQL resource trên Coolify                                     ║
# ║  2. Lấy Internal URL từ PostgreSQL settings → paste vào POSTGRES_HOST        ║
# ║  3. Vào tab "Environment Variables" của API resource                         ║
# ║  4. Paste các biến trên (bỏ dấu # ở đầu)                                     ║
# ║  5. Click Save → Deploy                                                      ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
#

services:
  # Main API Service
  demif-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: demif-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=${DATABASE_URL}
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER:-Demif.Api}
      - Jwt__Audience=${JWT_AUDIENCE:-Demif.Client}
      - Jwt__ExpirationMinutes=${JWT_EXPIRATION_MINUTES:-60}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - demif-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: demif-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-demif}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-demif_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - demif-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-demif} -d ${POSTGRES_DB:-demif_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  demif-network:
    driver: bridge

volumes:
  postgres_data:
